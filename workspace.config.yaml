# Workspace Configuration
# Consumer-owned — template sync never overwrites this file.
# Schema: docs/architecture/configuration.md

# ─── Identity ──────────────────────────────────────────────
workspace:
  name: "" # Your workspace or project name
  description: "" # What this workspace is for

# ─── Forge Topology ───────────────────────────────────────
# Which provider handles each concern.
# Supports split topologies (e.g., repos on GitHub, boards on ADO).
forge:
  topology:
    repos: github # github | ado | gitlab
    boards: github # github | ado | jira
    ci: github-actions # github-actions | ado-pipelines | gitlab-ci
    releases: github # github | ado | gitlab
  tooling:
    preferred: cli # mcp | cli | api — default tool preference

# ─── AI Runtimes ──────────────────────────────────────────
# Which AI assistants are active in this workspace.
adapters:
  ai-runtimes:
    - github-copilot
    - claude-code
    - jetbrains-junie

# ─── Process Profile ─────────────────────────────────────
# lightweight — minimal ceremony, self-merge allowed
# standard    — balanced process, 1 reviewer, CI required (default)
# regulated   — full audit trail, 2 reviewers, no self-merge
process:
  profile: standard

# ─── Board Configuration ─────────────────────────────────
# Provider-specific wiring. Fill in your board's real IDs.
# To find GitHub Projects v2 field IDs, use:
#   gh api graphql -f query='{ ... }' (see docs/guides/getting-started.md)
board:
  provider: "github-projects-v2"
  url: "" # e.g., https://github.com/orgs/your-org/projects/1
  project_id: "" # e.g., PVT_kwHO...

  fields:
    status: { field_id: "" } # Single-select field for status
    priority: { field_id: "" } # Single-select field for priority
    size: { field_id: "" } # Single-select field for size

  status_options:
    backlog: { option_id: "" }
    ready: { option_id: "" }
    in-progress: { option_id: "" }
    in-review: { option_id: "" }
    done: { option_id: "" }

  priority_options:
    p0: { option_id: "" } # Drop everything
    p1: { option_id: "" } # This milestone
    p2: { option_id: "" } # If capacity

  size_options:
    xs: { option_id: "" } # < 1 hour
    s: { option_id: "" } # 1-4 hours
    m: { option_id: "" } # 1-2 days
    l: { option_id: "" } # 3-5 days
    xl: { option_id: "" } # 1+ week (consider splitting)

# ─── Commands ─────────────────────────────────────────────
# Tech-stack-specific commands. Agents read these from config at runtime.
commands:
  build: "" # e.g., npm run build, dotnet build
  test: "" # e.g., npm test, dotnet test
  run: "" # e.g., npm start, dotnet run
  lint: "" # e.g., npm run lint, dotnet format

# ─── Project ─────────────────────────────────────────────
project:
  root: "" # Project root (relative to workspace), empty for multi-repo
  base-branch: "main"
  branch-pattern: "<type>/<issue-number>-<kebab-description>"
  merge-method: merge # merge | squash | rebase — default PR merge strategy
  overlay-file: "docs/workspace/project-overlay.md"
